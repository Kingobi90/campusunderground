<!-- Loading Overlay Component -->
<div id="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; flex-direction: column;">
    <div style="width: 50px; height: 50px; border: 3px solid #ffff00; border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite;"></div>
    <p style="color: #fff; margin-top: 20px;">Loading...</p>
    
    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</div>

<!-- Error Message Component -->
<div id="error-message" style="display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #ff3333; color: #fff; padding: 15px 25px; border-radius: 8px; font-weight: bold; z-index: 1000;"></div>
